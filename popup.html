<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 200px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    button { 
      width: 100%; background: #2196F3; color: white; border: none; 
      padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;
    }
    button:hover { background: #1976D2; }
    p { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h3>Jane Street 助手</h3>
  <p>进入申请页面后点击下方按钮：</p>
  <button id="fillBtn">一键填充表格</button>
  <script>
    document.getElementById('fillBtn').addEventListener('click', () => {
      chrome.tabs.query({active: true, currentWindow: true}, (tabs) => {
        chrome.tabs.sendMessage(tabs[0].id, {action: "fillForm"});
      });
    });
  </script>
</body>
</html>
